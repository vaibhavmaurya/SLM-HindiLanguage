project:
  name: hindi-slm-tokenizer
  tokenizer_version: hindi_slm_tokenizer_v001
  data_root: data
  log_level: DEBUG

input:
  parquet_train_folder: tests/fixtures/sample_parquet
  text_column: final_text
  file_pattern: "*.parquet"

sampling:
  random_seed: 42
  smoke_test:
    target_size_gb: 0.001
    output_file: data/samples/smoke_test/test_sample.txt
  experiment:
    target_size_gb: 0.001
    output_file: data/samples/experiment/test_sample.txt
  final:
    target_size_gb: 0.001
    output_file: data/samples/final/test_sample.txt

text_filters:
  min_char_count: 30
  max_char_count: 5000
  min_devanagari_ratio: 0.60
  remove_empty: true
  normalize_unicode: true

tokenizer:
  algorithm: unigram
  vocab_sizes: [24000, 32000, 48000]
  default_vocab_size: 32000
  normalizer: nfkc
  pre_tokenizer: metaspace
  decoder: metaspace
  max_piece_length: 24
  n_sub_iterations: 2
  model_max_length: 2048

special_tokens:
  pad_token: "<pad>"
  unk_token: "<unk>"
  bos_token: "<s>"
  eos_token: "</s>"
  additional_special_tokens:
    - "<|system|>"
    - "<|user|>"
    - "<|assistant|>"
    - "<|end|>"

artifacts:
  artifact_dir: data/artifacts
  final_dir: data/final/hindi_slm_tokenizer_v001

validation:
  thresholds:
    max_unk_rate: 0.001
    min_chars_per_token: 3.0
    max_tokens_per_word: 2.5
    min_roundtrip_success_rate: 0.99
    min_devanagari_coverage: 0.995
    max_special_token_split_failures: 0
