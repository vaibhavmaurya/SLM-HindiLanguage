# ingestion_config.yaml — Master pipeline configuration
# Controls which sources are enabled and global runtime settings.
# Add new data sources under the `sources` key.

project:
  name: hindi-slm-corpus
  corpus_version: hindi_corpus_v001
  data_root: data
  log_level: INFO

sources:
  sangraha:
    enabled: true
    dataset_name: ai4bharat/sangraha
    data_dir: verified/hin
    split: train[:15%]
    streaming: false
    # Max records to load; set to null for all records
    max_records: null
    # Local cache directory for HuggingFace datasets; null uses ~/.cache/huggingface
    cache_dir: null

  pdf:
    enabled: true
    input_dir: data/raw/pdf
    require_metadata_json: true

  wiki:
    enabled: false  # disabled — hitting 429 Too Many Requests from MediaWiki API
    seeds:
      - url: "https://hi.wikipedia.org/wiki/%E0%A4%AE%E0%A4%B9%E0%A4%BE%E0%A4%AD%E0%A4%BE%E0%A4%B0%E0%A4%A4"
        name: "mahabharata"
        category: "epic_literature"
        follow_links: true
        max_depth: 2
        max_pages: 150
        link_include_pattern: null
        link_exclude_pattern: null
      # To add more seed pages, append entries here, e.g.:
      # - url: "https://hi.wikipedia.org/wiki/रामायण"
      #   name: "ramayana"
      #   category: "epic_literature"
      #   follow_links: true
      #   max_depth: 1
      #   max_pages: 80

runtime:
  # Number of records processed per batch in memory-intensive stages
  batch_size: 10000
  random_seed: 42
  # Number of shards for final output files
  max_shard_size_mb: 512
